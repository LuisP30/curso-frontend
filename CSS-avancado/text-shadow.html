<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Text Shadow</title>
    <style>
        h1{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 100px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 3em;

            text-shadow: -10px -10px 2px red, 10px 10px 2px green;
            /* 
            - deslocamento horizontal
            - deslocamento vertical
            - desfoque
            - cor

            posso ter mais de uma sombra
            */
        }
    </style>
</head>
<body>
    <h1>Text Shadow</h1>
</body>
</html>
