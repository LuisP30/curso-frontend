<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Transition</title>
    <style>
        div{
            background-color: orange;
            width: 200px;
            height: 150px;
            margin: 100px auto;

            /* Define quais propriedades serão animadas */
            transition-property: width, height, background-color;

            /* Duração da animação para cada propriedade.
               width = 1s
               height = 2s
               background-color = 1s (reutiliza o primeiro valor) 
               se tivesse outra propriedade, utilizaria 2s, depois 1s (vai alternando)
               */
            transition-duration: 1s, 2s;

            /* Define a velocidade da animação ao longo do tempo.
               Pode ser: ease, linear, ease-in, ease-out, ease-in-out
               ou uma curva personalizada com cubic-bezier(). */
            transition-timing-function: cubic-bezier(.56,-0.19,.53,1.38);

            /* Tempo de espera antes da animação iniciar.
               width = 0s
               height = 0.5s
               background-color = 0s (reutiliza o primeiro valor)

               Mesmo o valor zero deve ser informado com unidade (0s). */
            transition-delay: 0s, .5s;

            /*
                Forma abreviada (shorthand):

                transition:
                    propriedade duração timing-function delay;

                Exemplo:

                transition:
                    width .5s ease,
                    height 1s ease .3s,
                    background-color .5s ease;

                Se nenhuma propriedade for informada,
                o padrão é "all".
            */
        }

        div:hover{
            width: 400px;
            height: 300px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
