<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variáveis</title>
    <style>
        :root{
            /* Variável declarada no root para que todos os outros
            seletores tenham acesso (escopo) (mesmo que HTML) */
            --header-height: 15rem;
            --main-color: rgb(238, 249, 90);
        }
        html{
            font-size: 62.5%;
        }
        header{
            width: 100%;
            background-color: rgba(255, 0, 0, .5);
            height: var(--header-height);
            font-size: 2rem;
            position: fixed;
            top: 0;
            left: 0;
        }
        main{
            min-height: calc(100vh - var(--header-height) - 2rem);
            background-color: var(--main-color);
            font-size: 2rem;
            margin-top: var(--header-height);
        }
        p{
            margin: calc(var(--header-height) * 2);
        }
        footer{
            height: 10rem;
            font-size: 2rem;
            background-color: blue;
        }
    </style>
</head>
<body>
    <header>header</header>
    <main>main
        <p>teste</p>
    </main>
    <footer>footer</footer>
</body>
</html>
