<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .flexbox {
            height: 250px;
            border: 3px solid red;
            display: flex;
            margin-bottom: 16px;
            /* flex-wrap: nowrap; (Valor padrão) */
            /* flex-direction: row; (Valor padrão) */
            /* flex-flow: row nowrap; (Propriedade atalho para as propriedades acima) */
        }
        .flexbox div {
            border: 2px solid orange;
            width: 150px;
            margin: 15px;
        }
        .flex-container1{
            /* flex-wrap: nowrap;
            flex-direction: row; */
            flex-flow: row wrap;
        }
        .flex-container2{
            /* justify-content: space-around; 
            Cada item ganha espaço ao redor (as bordas acabam ficando com metade)
            */

            /* justify-content: space-between; 
            Posiciona o primeiro e o último perto das bordas e
            divide o espaço restante com os elementos mais centrais
            */

            justify-content: space-evenly;
            /* Similar com o around, porém, divide o espaço de forma igual para
            todos os elementos */
           
        }
        .flex-container2 div, .flex-container3 div, .flex-container4 div{
            width: 30px;
            margin: 0;
        }
        .flex-container3{
            justify-content: space-around;
            align-items: center; /*strech é o padrão*/
        }
        .flex-container4{
            justify-content: space-around;
            align-items: baseline; /* Usou como base a base da fonte */
        }
        .flex-container5{
            justify-content: center;
            flex-wrap: wrap;
            /* align-items: flex-end; */
            align-content: stretch; /* Serve para alinhar quando tenho mais de uma linha */

            /* align-items alinha os itens dentro de cada linha.
            align-content alinha as linhas de itens.
            align-content só tem efeito quando há múltiplas linhas,
            o que normalmente ocorre com flex-wrap: wrap. */
        }
        .flex-container5 div{
            width: 150px;
        }
        .flex-container6{
            justify-content: flex-end;
            align-items: flex-start;
            flex-direction: row-reverse; /* aprendendo sobre main-axis e cross-axis */
            height: 400px;
        }
        .flex-container6 div{
            background-color: yellow;
            width: 50px;
            height: 20px;
        }
        .flex-container7{
            justify-content: flex-end;
            align-items: flex-start;
            flex-direction: column; /* aprendendo sobre main-axis e cross-axis */
            height: 400px;
        }
        .flex-container7 div{
            background-color: yellow;
            width: 50px;
            height: 50px;
        }
        .flex-container7 .div2{
            flex-basis: 200px; /* Prevalece sobre o width ou height, depende de como está o
            flex-direction */
        }
        .flex-container8{
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .flex-container8 div{
            flex-basis: 50px;
            background-color: orange;
            margin: 0;
        }
        .flex-container8 .div2{
            flex-grow: 1;
            /* define quanto um elemento pode crescer para ocupar o espaço livre 
            disponível dentro de um contêiner flex. Quanto maior o valor, maior 
            a proporção de espaço que ele recebe em relação aos outros itens. */
            /* valor padrão: 0 */

        }
        .flex-container8 .div4{
            flex-grow: 2;
        }
        .flex-container9{
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .flex-container9 div{
            margin: 0;
            flex-basis: 150px;
            background-color: blue;
        }
        .flex-container9 .div1{
            /* flex-shrink: 2; */
            /* define quanto um elemento pode encolher quando não há espaço suficiente 
            dentro de um contêiner flex. Quanto maior o valor, mais o item pode reduzir 
            de tamanho em relação aos demais. */ 
            /* valor padrão: 1 */

            /* Atalho para shrink, grow e basis */
           /* flex:  grow shrink basis; */
           flex: 1 3 200px;
        }
        .flex-container10{
            flex-direction: column;
            height: 300px;
        }
        .flex-container10 div{
            background-color: green;
            font-size: 36px;
            color: white;
            
        }
        .flex-container10 .div2{
            order: 1; /* 0 é o padrão */
            /* order: define a ordem de exibição de um item flex ou grid.
            Quanto menor o valor, mais cedo o item aparece. O padrão é 0. */
            align-self: flex-end;
        }
        .flex-container10 .div1{
            order: 2;
            align-self: center;
            /* align-self: define o alinhamento de um item individual no eixo transversal,
            sobrescrevendo o align-items do contêiner. */
        }
    </style>
</head>
<body>
    <div class="flexbox flex-container1">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div class="flexbox flex-container2">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div class="flexbox flex-container3">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container4">
        <div class="div1">1</div>
        <div class="div2" style="font-size: 36px;">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container5">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container6">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container7">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container8">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container9">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
    <div class="flexbox flex-container10">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
</body>
</html>
